services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: threatchain_user
      POSTGRES_PASSWORD: threatchain_pass
      POSTGRES_DB: threatchain
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatchain_user -d threatchain"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://threatchain_user:threatchain_pass@db:5432/threatchain
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./knowledge_base:/app/knowledge_base
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build: .
    restart: unless-stopped
    working_dir: /app
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      PYTHONPATH: /app
      THREATCHAIN_API_BASE: http://api:8000/api/v1
      THREATCHAIN_WS_BASE: ws://api:8000/ws
    depends_on:
      api:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    working_dir: /app
    command: python -m app.bot.telegram_bot
    env_file: .env
    environment:
      PYTHONPATH: /app
      THREATCHAIN_API_BASE: http://api:8000/api/v1
      THREATCHAIN_WS_BASE: ws://api:8000/ws
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
